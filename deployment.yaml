apiVersion: apps/v1
kind: Deployment
metadata:
  name: myapp-deployment100
spec:
  replicas: 2
  selector:
    matchLabels:
      app: myapp100
  template:
    metadata:
      labels:
        app: myapp100
    spec:
      containers:
      - name: myapp-container100
        image: "ranatarek/my-app:latest"
        ports:
        - containerPort: 8000